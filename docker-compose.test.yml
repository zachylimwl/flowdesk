services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdesk-postgres-test
    environment:
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk_dev
      POSTGRES_DB: flowdesk_test
    ports:
      - '5433:5432'
    volumes:
      - flowdesk_postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowdesk -d flowdesk_test']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowdesk-redis-test
    ports:
      - '6380:6379'
    volumes:
      - flowdesk_redis_test_data:/var/lib/redis/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  flowdesk_postgres_test_data:
  flowdesk_redis_test_data:
