services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdesk-postgres
    environment:
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk_dev
      POSTGRES_DB: flowdesk_dev
    ports:
      - '5432:5432'
    volumes:
      - flowdesk_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowdesk -d flowdesk_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowdesk-redis
    ports:
      - '6379:6379'
    volumes:
      - flowdesk_redis_data:/var/lib/redis/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  flowdesk_postgres_data:
  flowdesk_redis_data:
