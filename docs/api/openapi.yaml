          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the project.

    get:
      operationId: getProject
      tags: [Projects]
      summary: Get project details including members. Caller must be a workspace member.
      responses:
        "200":
          description: Project details.
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
                  project:
                    $ref: "#/components/schemas/ProjectDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      operationId: updateProject
      tags: [Projects]
      summary: Update project fields. Requires OWNER, ADMIN, or project LEAD role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: Website Redesign v2
                slug:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$"
                  minLength: 3
                  maxLength: 50
                  example: website-redesign-v2
                description:
                  type: string
                  nullable: true
                  example: Full redesign including the blog.
                color:
                  type: string
                  nullable: true
                  example: "#8B5CF6"
      responses:
        "200":
          description: Project updated successfully.
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
                  project:
                    $ref: "#/components/schemas/ProjectDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The updated slug conflicts with an existing active project in this workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
