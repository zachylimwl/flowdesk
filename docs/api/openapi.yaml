        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createProject
      tags: [Projects]
      summary: Create a new project in the workspace. Requires OWNER or ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: Website Redesign
                slug:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$"
                  minLength: 3
                  maxLength: 50
                  description: URL-safe identifier. Unique within the workspace among active projects. Lowercase alphanumeric and hyphens only; cannot start or end with a hyphen.
                  example: website-redesign
                description:
                  type: string
                  nullable: true
                  example: Overhaul of the marketing site.
                color:
                  type: string
                  nullable: true
                  description: Hex colour code used in the UI.
                  example: "#6366F1"
      responses:
        "201":
          description: Project created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
