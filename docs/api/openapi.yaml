openapi: "3.1.0"

info:
  title: FlowDesk API
  version: "1.0.0"
  description: |
    Multi-tenant B2B SaaS project management platform API.

    All workspace-scoped endpoints resolve `workspaceId` from the authenticated
    session — never from a client-supplied value. Access tokens expire after
    15 minutes; use `POST /auth/refresh` to obtain a new pair transparently.

servers:
  - url: http://localhost:3001/api/v1
    description: Development
  - url: https://api.flowdesk.app/v1
    description: Production

tags:
  - name: Authentication
    description: Registration, login, token refresh, and session management.
  - name: Workspaces
    description: Workspace CRUD, member management, and invitations.
  - name: Projects
    description: Project CRUD and project-level membership.
  - name: Tasks
    description: Task CRUD, assignment, status transitions, and sub-tasks.
  - name: Comments
    description: Task comments.
  - name: Labels
    description: Workspace-scoped label management.
security:
  - BearerAuth: []

x-deferred-to:
  - feature: email-verification
    reason: Not required for Phase 3 launch. emailVerifiedAt field exists on the User model.
    model: User.emailVerifiedAt
    endpoints:
      - "POST /auth/verify-email"

  - feature: password-reset
    reason: Not required for Phase 3 launch.
    model: User.passwordHash
    endpoints:
      - "POST /auth/forgot-password"
      - "POST /auth/reset-password"

  - feature: account-deletion
    reason: GDPR soft-delete for users is deferred until compliance requirements are confirmed.
    model: User.deletedAt
    endpoints:
      - "DELETE /auth/me"

  - feature: workspace-invitation-accept
    reason: >
      Invite creation (POST .../invite) ships in Phase 3. The email-link accept flow
      (token lookup, acceptance, WorkspaceMember creation) is deferred. Admin-side list
      and cancel endpoints are deferred alongside it as they are only useful once
      invitees can act on invitations.
    model: WorkspaceInvite
    endpoints:
      - "GET /invitations/{token}"
      - "POST /invitations/{token}/accept"
      - "GET /workspaces/{workspaceId}/invitations"
      - "DELETE /workspaces/{workspaceId}/invitations/{invitationId}"

  - feature: file-attachments
    reason: >
      Attachment model is in the schema and attachmentCount surfaces in TaskDetail.
      Full upload/storage integration (pre-signed URLs, CDN wiring) is deferred.
    model: Attachment
    endpoints:
      - "GET /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/attachments"
      - "POST /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/attachments"
      - "DELETE /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/attachments/{attachmentId}"
      - "POST /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/comments/{commentId}/attachments"
      - "DELETE /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/comments/{commentId}/attachments/{attachmentId}"

  - feature: api-tokens
    reason: External integration support. ApiToken model is in the schema.
    model: ApiToken
    endpoints:
      - "GET /workspaces/{workspaceId}/tokens"
      - "POST /workspaces/{workspaceId}/tokens"
      - "DELETE /workspaces/{workspaceId}/tokens/{tokenId}"

  - feature: webhooks
    reason: Outbound event delivery. Webhook model is in the schema.
    model: Webhook
    endpoints:
      - "GET /workspaces/{workspaceId}/webhooks"
      - "POST /workspaces/{workspaceId}/webhooks"
      - "GET /workspaces/{workspaceId}/webhooks/{webhookId}"
      - "PATCH /workspaces/{workspaceId}/webhooks/{webhookId}"
      - "DELETE /workspaces/{workspaceId}/webhooks/{webhookId}"

  - feature: audit-logs
    reason: >
      AuditLog model is in the schema (append-only). Read endpoint deferred until
      access control and retention policy are defined.
    model: AuditLog
    endpoints:
      - "GET /workspaces/{workspaceId}/audit-logs"

  - feature: workspace-task-list
    reason: >
      The Task model denormalises workspaceId explicitly for this query pattern ("My Tasks").
      Deferred until the frontend requires a cross-project task view; per-project listing
      (GET /workspaces/{workspaceId}/projects/{projectId}/tasks) covers Phase 3 needs.
    model: Task.workspaceId
    endpoints:
      - "GET /workspaces/{workspaceId}/tasks"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------

components:

  # -------------------------------------------------------------------------
  # Security schemes
  # -------------------------------------------------------------------------

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token. Expires after 15 minutes.
  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------

  schemas:

    # -----------------------------------------------------------------------
    # Enums
    # -----------------------------------------------------------------------

    WorkspaceRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]
      description: |
        - `OWNER` — Full control; can delete the workspace. Exactly one per workspace.
        - `ADMIN` — Can manage members, projects, and workspace settings.
        - `MEMBER` — Can create and update tasks and projects they are assigned to.
        - `VIEWER` — Read-only access to workspace content.

    ProjectRole:
      type: string
      enum: [LEAD, MEMBER, VIEWER]
      description: |
        - `LEAD` — Can manage project settings and all tasks within the project.
        - `MEMBER` — Can create and update tasks within the project.
        - `VIEWER` — Read-only access to the project and its tasks.

    TaskStatus:
      type: string
      enum: [BACKLOG, TODO, IN_PROGRESS, IN_REVIEW, DONE, CANCELLED]

    TaskPriority:
      type: string
      enum: [URGENT, HIGH, MEDIUM, LOW, NONE]

    # -----------------------------------------------------------------------
    # Shared primitives
    # -----------------------------------------------------------------------

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. EMAIL_ALREADY_REGISTERED).
              example: EMAIL_ALREADY_REGISTERED
            message:
              type: string
              description: Human-readable error description.
              example: A user with that email address already exists.
            details:
              type: object
              description: Optional structured details (e.g. field-level validation errors).
              additionalProperties: true

    PaginationMeta:
      type: object
      required: [total, page, pageSize]
      properties:
        total:
          type: integer
          description: Total number of items matching the query.
          example: 42
        page:
          type: integer
          description: Current page number (1-indexed).
          example: 1
        pageSize:
          type: integer
          description: Maximum number of items per page.
          example: 20

    # -----------------------------------------------------------------------
    # Auth
    # -----------------------------------------------------------------------

    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
          description: Short-lived JWT used to authenticate API requests (15 min).
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Long-lived opaque token used to obtain a new token pair (7 days).
          example: rt_a1b2c3d4e5f6...
        expiresIn:
          type: integer
          description: Seconds until the access token expires.
          example: 900

    # -----------------------------------------------------------------------
    # Users
    # -----------------------------------------------------------------------

    UserProfile:
      type: object
      required: [id, email, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Smith
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://cdn.flowdesk.app/avatars/alice.png
        createdAt:
          type: string
          format: date-time
          example: "2025-01-15T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-03-10T14:22:00Z"

    # -----------------------------------------------------------------------
    # Workspaces
    # -----------------------------------------------------------------------

    WorkspaceSummary:
      type: object
      required: [id, name, slug, role, memberCount, createdAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        name:
          type: string
          example: Acme Corp
        slug:
          type: string
          example: acme-corp
        logoUrl:
          type: string
          format: uri
          nullable: true
          example: https://cdn.flowdesk.app/logos/acme.png
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        memberCount:
          type: integer
          example: 12
        createdAt:
          type: string
          format: date-time
          example: "2025-01-15T10:00:00Z"

    WorkspaceDetail:
      allOf:
        - $ref: "#/components/schemas/WorkspaceSummary"
        - type: object
          required: [updatedAt]
          properties:
            updatedAt:
              type: string
              format: date-time
              example: "2025-06-01T08:30:00Z"

    WorkspaceMember:
      type: object
      required: [id, userId, user, role, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        userId:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c6
        user:
          $ref: "#/components/schemas/UserProfile"
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        createdAt:
          type: string
          format: date-time
          example: "2025-02-01T09:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-04-15T11:30:00Z"

    WorkspaceInvitation:
      type: object
      required: [id, email, role, expiresAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        email:
          type: string
          format: email
          example: bob@example.com
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        expiresAt:
          type: string
          format: date-time
          example: "2025-05-08T10:00:00Z"
        createdAt:
          type: string
          format: date-time
          example: "2025-05-01T10:00:00Z"

    # -----------------------------------------------------------------------
    # Projects
    # -----------------------------------------------------------------------

    ProjectSummary:
      type: object
      required: [id, workspaceId, name, slug, taskCount, createdAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        workspaceId:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c4
        name:
          type: string
          example: Website Redesign
        slug:
          type: string
          example: website-redesign
        description:
          type: string
          nullable: true
          example: Overhaul of the marketing site.
        color:
          type: string
          nullable: true
          description: Hex colour used in the UI for this project.
          example: "#6366F1"
        taskCount:
          type: integer
          example: 34
        createdAt:
          type: string
          format: date-time
          example: "2025-03-01T12:00:00Z"

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"
        - type: object
          required: [members, updatedAt]
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/ProjectMember"
            updatedAt:
              type: string
              format: date-time
              example: "2025-06-15T14:00:00Z"

    ProjectMember:
      type: object
      required: [id, userId, user, role, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        userId:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c6
        user:
          $ref: "#/components/schemas/UserProfile"
        role:
          $ref: "#/components/schemas/ProjectRole"
        createdAt:
          type: string
          format: date-time
          example: "2025-03-05T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-05-01T09:45:00Z"

    # -----------------------------------------------------------------------
    # Tasks
    # -----------------------------------------------------------------------

    LabelSummary:
      type: object
      required: [id, name, color, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        name:
          type: string
          example: bug
        color:
          type: string
          description: Hex colour code.
          example: "#EF4444"
        createdAt:
          type: string
          format: date-time
          example: "2025-03-01T09:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-03-01T09:00:00Z"

    TaskSummary:
      type: object
      required: [id, projectId, workspaceId, title, status, priority, position, assignees, labels, createdAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        projectId:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c4
        workspaceId:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c3
        title:
          type: string
          example: Fix login redirect loop
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        dueDate:
          type: string
          format: date-time
          nullable: true
          example: "2025-07-31T23:59:59Z"
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/LabelSummary"
        position:
          type: number
          format: double
          description: Fractional index used for drag-and-drop ordering within a project+status bucket.
          example: 65536.0
        createdAt:
          type: string
          format: date-time
          example: "2025-04-10T08:00:00Z"

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/TaskSummary"
        - type: object
          required: [commentCount, attachmentCount, updatedAt]
          properties:
            description:
              type: string
              nullable: true
              description: Rich text or Markdown body.
              example: "Steps to reproduce:\n1. Log in\n2. Navigate to /dashboard"
            parentId:
              type: string
              format: uuid
              nullable: true
              description: ID of the parent task. Null for top-level tasks.
              example: null
            subTasks:
              type: array
              description: Direct sub-tasks (max nesting depth 1).
              items:
                $ref: "#/components/schemas/TaskSummary"
            commentCount:
              type: integer
              example: 5
            attachmentCount:
              type: integer
              example: 2
            updatedAt:
              type: string
              format: date-time
              example: "2025-06-20T16:45:00Z"

    # -----------------------------------------------------------------------
    # Comments
    # -----------------------------------------------------------------------

    CommentSummary:
      type: object
      required: [id, taskId, author, body, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c5
        taskId:
          type: string
          format: uuid
          example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c4
        author:
          $ref: "#/components/schemas/UserProfile"
        body:
          type: string
          description: Comment text; Markdown supported.
          example: "Reproduced on Chrome 124. Root cause is the redirect middleware."
        createdAt:
          type: string
          format: date-time
          example: "2025-05-01T11:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-05-01T11:00:00Z"

  # -------------------------------------------------------------------------
  # Reusable responses
  # -------------------------------------------------------------------------

  responses:
    Unauthorized:
      description: Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication is required to access this resource.

    Forbidden:
      description: Authenticated user does not have the required role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: You do not have permission to perform this action.

    NotFound:
      description: The requested resource does not exist or is not accessible.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: The requested resource was not found.

    UnprocessableEntity:
      description: Request body failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: Request validation failed.
              details:
                email: Must be a valid email address.
                password: Must be at least 8 characters.

    InternalServerError:
      description: An unexpected server error occurred.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: An unexpected error occurred. Please try again later.

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

paths:

  # -------------------------------------------------------------------------
  # Authentication
  # -------------------------------------------------------------------------

  /auth/register:
    post:
      operationId: registerUser
      tags: [Authentication]
      summary: Register a new user account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "S3cureP@ssword!"
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: Alice Smith
      responses:
        "201":
          description: User registered successfully. Returns the new user profile and auth tokens.
          content:
            application/json:
              schema:
                type: object
                required: [user, tokens]
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
                  tokens:
                    $ref: "#/components/schemas/AuthTokens"
        "409":
          description: Email address is already registered to an active account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: EMAIL_ALREADY_REGISTERED
                  message: A user with that email address already exists.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      operationId: loginUser
      tags: [Authentication]
      summary: Authenticate with email and password and receive tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  format: password
                  example: "S3cureP@ssword!"
      responses:
        "200":
          description: Login successful. Returns the user profile and auth tokens.
          content:
            application/json:
              schema:
                type: object
                required: [user, tokens]
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
                  tokens:
                    $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: INVALID_CREDENTIALS
                  message: The email or password you entered is incorrect.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      operationId: refreshTokens
      tags: [Authentication]
      summary: Exchange a valid refresh token for a new token pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: The opaque refresh token issued at login or a previous refresh.
                  example: rt_a1b2c3d4e5f6...
      responses:
        "200":
          description: Tokens refreshed successfully.
          content:
            application/json:
              schema:
                type: object
                required: [tokens]
                properties:
                  tokens:
                    $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Refresh token is invalid, expired, or has been revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: INVALID_REFRESH_TOKEN
                  message: The refresh token is invalid or has expired. Please log in again.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [Authentication]
      summary: Revoke the current refresh token and invalidate the session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: The refresh token to revoke.
                  example: rt_a1b2c3d4e5f6...
      responses:
        "204":
          description: Session terminated. The refresh token has been revoked.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      summary: Return the authenticated user's profile.
      responses:
        "200":
          description: The current user's profile.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      operationId: updateCurrentUser
      tags: [Authentication]
      summary: Update the authenticated user's profile. Partial update — provide only the fields to change.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: Alice Johnson
                avatarUrl:
                  type: string
                  format: uri
                  nullable: true
                  example: https://cdn.flowdesk.app/avatars/alice-new.png
      responses:
        "200":
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [Authentication]
      summary: Change the authenticated user's password.
      description: |
        Requires the caller's current password for verification. On success, all
        existing refresh tokens for the user are revoked and a new token pair is issued,
        equivalent to a fresh login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: The user's current password for verification.
                  example: "S3cureP@ssword!"
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  description: The new password to set.
                  example: "N3wP@ssword!"
      responses:
        "200":
          description: Password changed. All prior sessions revoked; new tokens issued.
          content:
            application/json:
              schema:
                type: object
                required: [tokens]
                properties:
                  tokens:
                    $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Current password is incorrect or the access token is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: INVALID_CURRENT_PASSWORD
                  message: The current password you entered is incorrect.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # -------------------------------------------------------------------------
  # Workspaces
  # -------------------------------------------------------------------------

  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [Workspaces]
      summary: List all workspaces the authenticated user belongs to.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed).
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page.
      responses:
        "200":
          description: Paginated list of workspaces.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createWorkspace
      tags: [Workspaces]
      summary: Create a new workspace. The caller automatically becomes the OWNER.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: Acme Corp
                slug:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$"
                  minLength: 3
                  maxLength: 50
                  description: URL-safe identifier. Globally unique. Immutable after creation. Lowercase alphanumeric and hyphens only; cannot start or end with a hyphen.
                  example: acme-corp
      responses:
        "201":
          description: Workspace created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: "#/components/schemas/WorkspaceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: The slug is already taken by another workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: SLUG_ALREADY_TAKEN
                  message: A workspace with that slug already exists.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.

    get:
      operationId: getWorkspace
      tags: [Workspaces]
      summary: Get workspace details. Caller must be a member.
      responses:
        "200":
          description: Workspace details.
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: "#/components/schemas/WorkspaceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      operationId: updateWorkspace
      tags: [Workspaces]
      summary: Update workspace fields. Name and logo require OWNER or ADMIN role; slug requires OWNER role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: Acme Corporation
                slug:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$"
                  minLength: 3
                  maxLength: 50
                  description: Owner-only. Changing the slug breaks all existing workspace links — no redirect is provided. ADMIN callers supplying this field receive 403.
                  example: acme-corp-new
                logoUrl:
                  type: string
                  format: uri
                  nullable: true
                  example: https://cdn.flowdesk.app/logos/acme-v2.png
      responses:
        "200":
          description: Workspace updated successfully.
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: "#/components/schemas/WorkspaceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The slug is already taken by another workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: SLUG_ALREADY_TAKEN
                  message: A workspace with that slug already exists.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: deleteWorkspace
      tags: [Workspaces]
      summary: Hard-delete the workspace and all its data. Requires OWNER role.
      description: |
        Permanently removes the workspace in a single transaction: first purges all
        AuditLog records for the workspace (required by the onDelete: Restrict constraint
        on the AuditLog → Workspace FK), then hard-deletes the workspace row, cascading
        to all remaining child records (members, invitations, projects, tasks, etc.).
        This action is irreversible.

        The request body must include `confirmName` set to the exact current workspace name.
        Requests with a missing or non-matching `confirmName` are rejected with 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmName]
              properties:
                confirmName:
                  type: string
                  description: Must exactly match the workspace's current `name` as a deletion safeguard.
                  example: Acme Corp
      responses:
        "204":
          description: Workspace deleted.
        "400":
          description: confirmName is absent or does not match the workspace name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CONFIRMATION_MISMATCH
                  message: The confirmation name does not match the workspace name.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/members:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.

    get:
      operationId: listWorkspaceMembers
      tags: [Workspaces]
      summary: List members of a workspace. Caller must be a member.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed).
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page.
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/WorkspaceRole"
          description: Filter members by role.
      responses:
        "200":
          description: Paginated list of workspace members.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceMember"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/members/invite:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.

    post:
      operationId: inviteWorkspaceMember
      tags: [Workspaces]
      summary: Send a workspace invitation by email. Requires OWNER or ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: bob@example.com
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
                  description: |
                    Role granted to the invitee on acceptance. Defaults to MEMBER.
                    OWNER is not a valid value — ownership transfer must go through
                    PATCH /workspaces/{workspaceId}/members/{userId} for existing members.
      responses:
        "201":
          description: Invitation created and email dispatched.
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: "#/components/schemas/WorkspaceInvitation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The email is already a member or has a pending invitation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: INVITE_ALREADY_EXISTS
                  message: This email address is already a member or has a pending invitation.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/members/{userId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the member to act on.

    patch:
      operationId: updateWorkspaceMember
      tags: [Workspaces]
      summary: Change a member's role. Requires OWNER or ADMIN.
      description: |
        ADMIN may assign ADMIN, MEMBER, or VIEWER. Only OWNER may assign the OWNER role.
        Assigning OWNER to another member is an atomic ownership transfer: the caller is
        demoted to ADMIN and the target member is promoted to OWNER in a single transaction.
        The OWNER role cannot otherwise be demoted — use this endpoint to transfer ownership first.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
      responses:
        "200":
          description: Member role updated successfully.
          content:
            application/json:
              schema:
                type: object
                required: [member]
                properties:
                  member:
                    $ref: "#/components/schemas/WorkspaceMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Validation error or attempt to change the OWNER's role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CANNOT_CHANGE_OWNER_ROLE
                  message: The workspace OWNER role cannot be changed through this endpoint. Transfer ownership first.
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: removeWorkspaceMember
      tags: [Workspaces]
      summary: Remove a member from the workspace. Requires OWNER or ADMIN. Cannot remove the sole OWNER.
      responses:
        "204":
          description: Member removed successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Attempt to remove the sole OWNER of the workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CANNOT_REMOVE_SOLE_OWNER
                  message: The sole OWNER of a workspace cannot be removed. Transfer ownership first.
        "500":
          $ref: "#/components/responses/InternalServerError"

  # -------------------------------------------------------------------------
