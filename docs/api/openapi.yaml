    get:
      operationId: listTasks
      tags: [Tasks]
      summary: List active tasks in a project. Caller must be a workspace member.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed).
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page.
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TaskStatus"
          style: form
          explode: true
          description: Filter by one or more statuses.
        - name: priority
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TaskPriority"
          style: form
          explode: true
          description: Filter by one or more priorities.
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter to tasks assigned to this user.
        - name: labelId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter to tasks carrying this label.
        - name: parentId
          in: query
          schema:
            type: string
          description: |
            Filter by parent task. Pass a UUID v7 to list sub-tasks of that task.
            Pass the literal string `"null"` to return only root-level tasks.
      responses:
        "200":
          description: Paginated list of tasks.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createTask
      tags: [Tasks]
      summary: Create a task in the project. Caller must be a workspace member with at least MEMBER role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 500
                  example: Fix login redirect loop
                description:
                  type: string
                  nullable: true
                  description: Rich text or Markdown.
                  example: "Steps to reproduce:\n1. Log in\n2. Navigate to /dashboard"
                status:
                  $ref: "#/components/schemas/TaskStatus"
                priority:
                  $ref: "#/components/schemas/TaskPriority"
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                  example: "2025-07-31T23:59:59Z"
                parentId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Parent task ID. Sub-tasks cannot themselves have sub-tasks (max depth 1).
                  example: null
                assigneeIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Workspace member user IDs to assign to this task.
                  example: []
                labelIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Label IDs to apply to this task.
                  example: []
      responses:
        "201":
          description: Task created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [task]
                properties:
                  task:
                    $ref: "#/components/schemas/TaskDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the project.
      - name: taskId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the task.

    get:
      operationId: getTask
      tags: [Tasks]
      summary: Get full task details including sub-tasks, assignees, and labels. Caller must be a workspace member.
      responses:
        "200":
          description: Task details.
          content:
            application/json:
              schema:
                type: object
                required: [task]
                properties:
                  task:
                    $ref: "#/components/schemas/TaskDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      operationId: updateTask
      tags: [Tasks]
      summary: Update task fields. Accepts any subset of task fields plus position for drag-and-drop reordering.
      description: |
        Caller must hold at least workspace MEMBER role (or project LEAD, ADMIN, or OWNER).
        Workspace VIEWERs are not permitted to update tasks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 500
                  example: Fix login redirect loop (regression)
                description:
                  type: string
                  nullable: true
                status:
                  $ref: "#/components/schemas/TaskStatus"
                priority:
                  $ref: "#/components/schemas/TaskPriority"
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                parentId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Re-parent the task. Set to null to promote to a root task.
                position:
                  type: number
                  format: double
                  description: Fractional index value for drag-and-drop ordering within a project+status bucket.
                  example: 98304.0
                assigneeIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Replaces the full assignee list.
                labelIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Replaces the full label list.
      responses:
        "200":
          description: Task updated successfully.
          content:
            application/json:
              schema:
                type: object
                required: [task]
                properties:
                  task:
                    $ref: "#/components/schemas/TaskDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: deleteTask
      tags: [Tasks]
      summary: Soft-delete a task and all its sub-tasks in a single transaction. Requires workspace OWNER, ADMIN, or project LEAD role.
      responses:
        "204":
          description: Task soft-deleted successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/assignees:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the project.
      - name: taskId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the task.

    post:
      operationId: addTaskAssignee
      tags: [Tasks]
      summary: Assign a workspace member to a task. Caller must be a workspace member with at least MEMBER role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  format: uuid
                  description: UUID v7 of the workspace member to assign.
                  example: 01906b5e-3a1f-7000-8c6b-d7e1f2a3b4c6
      responses:
        "201":
          description: Assignee added. Returns the updated task.
          content:
            application/json:
              schema:
                type: object
                required: [task]
                properties:
                  task:
                    $ref: "#/components/schemas/TaskDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The user is already assigned to this task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: ALREADY_ASSIGNED
                  message: This user is already assigned to the task.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/assignees/{userId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the project.
      - name: taskId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the task.
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the assignee to remove.

    delete:
      operationId: removeTaskAssignee
      tags: [Tasks]
      summary: Remove a user from a task's assignee list. Caller may remove themselves; removing others requires at least workspace MEMBER role.
      responses:
        "204":
          description: Assignee removed successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # -------------------------------------------------------------------------
  # Comments
  # -------------------------------------------------------------------------

  /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/comments:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the project.
      - name: taskId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the task. Must belong to the specified project and workspace.

    get:
      operationId: listComments
      tags: [Comments]
      summary: List active comments on a task in chronological order. Caller must be a workspace member.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed).
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page.
      responses:
        "200":
          description: Paginated list of comments.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CommentSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createComment
      tags: [Comments]
      summary: Add a comment to a task. Caller must be a workspace member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  minLength: 1
                  description: Comment text. Markdown supported.
                  example: Reproduced on Chrome 124. Root cause is the redirect middleware.
      responses:
        "201":
          description: Comment created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [comment]
                properties:
                  comment:
                    $ref: "#/components/schemas/CommentSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/projects/{projectId}/tasks/{taskId}/comments/{commentId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the project.
      - name: taskId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the task. Must belong to the specified project and workspace.
      - name: commentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the comment.

    patch:
      operationId: updateComment
      tags: [Comments]
      summary: Edit a comment body. Requires caller to be the comment author, OWNER, or ADMIN.
      description: |
        Editing a comment updates `updatedAt`. The original `createdAt` is preserved.
        Only the `body` field may be changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  minLength: 1
                  description: Replacement comment text. Markdown supported.
                  example: Reproduced on Chrome 124 and Firefox 125. Root cause confirmed.
      responses:
        "200":
          description: Comment updated.
          content:
            application/json:
              schema:
                type: object
                required: [comment]
                properties:
                  comment:
                    $ref: "#/components/schemas/CommentSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: deleteComment
      tags: [Comments]
      summary: Soft-delete a comment. Requires caller to be the comment author, OWNER, or ADMIN.
      description: |
        Soft-deleted comments are retained in the database with `deletedAt` set.
        The UI may render a "This comment was deleted" placeholder in place of the body.
      responses:
        "204":
          description: Comment soft-deleted successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # -------------------------------------------------------------------------
  # Labels
  # -------------------------------------------------------------------------

  /workspaces/{workspaceId}/labels:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.

    get:
      operationId: listLabels
      tags: [Labels]
      summary: List all active labels in the workspace. Caller must be a workspace member.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed).
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Number of results per page.
      responses:
        "200":
          description: Paginated list of labels.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LabelSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createLabel
      tags: [Labels]
      summary: Create a label in the workspace. Requires OWNER or ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, color]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 50
                  example: bug
                color:
                  type: string
                  description: Hex colour code.
                  example: "#EF4444"
      responses:
        "201":
          description: Label created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [label]
                properties:
                  label:
                    $ref: "#/components/schemas/LabelSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A label with that name already exists in this workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: LABEL_NAME_CONFLICT
                  message: A label with that name already exists in this workspace.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /workspaces/{workspaceId}/labels/{labelId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the workspace.
      - name: labelId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: UUID v7 of the label.

    patch:
      operationId: updateLabel
      tags: [Labels]
      summary: Update a label's name or colour. Requires OWNER or ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 50
                  example: critical-bug
                color:
                  type: string
                  description: Hex colour code.
                  example: "#DC2626"
      responses:
        "200":
          description: Label updated successfully.
          content:
            application/json:
              schema:
                type: object
                required: [label]
                properties:
                  label:
                    $ref: "#/components/schemas/LabelSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A label with that name already exists in this workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: LABEL_NAME_CONFLICT
                  message: A label with that name already exists in this workspace.
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: deleteLabel
      tags: [Labels]
      summary: Soft-delete a label and detach it from all tasks. Requires OWNER or ADMIN role.
      responses:
        "204":
          description: Label soft-deleted successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
